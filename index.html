<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Stopwatch</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#3b0764);
overflow:hidden;
}

.container{
width:450px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
box-shadow:0 8px 32px rgba(0,0,0,0.4);
text-align:center;
color:white;
}

h1{
font-size:32px;
margin-bottom:20px;
}

.time{
font-size:55px;
font-weight:700;
margin-bottom:25px;
letter-spacing:2px;
color:#60a5fa;
}

.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

button{
padding:12px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
color:white;
}

.start{
background:#22c55e;
}

.pause{
background:#f59e0b;
}

.reset{
background:#ef4444;
}

.lap{
background:#3b82f6;
}

button:hover{
transform:translateY(-3px);
}

.laps{
max-height:220px;
overflow-y:auto;
text-align:left;
padding:10px;
background:rgba(255,255,255,0.05);
border-radius:15px;
}

.laps::-webkit-scrollbar{
width:6px;
}

.laps::-webkit-scrollbar-thumb{
background:#60a5fa;
border-radius:10px;
}

.lap-item{
padding:10px;
margin-bottom:8px;
border-radius:10px;
background:rgba(255,255,255,0.08);
display:flex;
justify-content:space-between;
}

.footer{
margin-top:15px;
font-size:13px;
color:#cbd5e1;
}

</style>
</head>
<body>

<div class="container">

<h1>⏱ Modern Stopwatch</h1>

<div class="time" id="display">
00:00:00:000
</div>

<div class="buttons">

<button class="start" onclick="startTimer()">
Start
</button>

<button class="pause" onclick="pauseTimer()">
Pause
</button>

<button class="reset" onclick="resetTimer()">
Reset
</button>

<button class="lap" onclick="lapTime()">
Lap
</button>

</div>

<div class="laps" id="laps"></div>

<div class="footer">
Built with HTML, CSS & JavaScript 🚀
</div>

</div>

<script>

let startTime=0;
let elapsedTime=0;
let timerInterval;
let running=false;
let lapCount=1;

function updateDisplay(){

let time=elapsedTime;

let hrs=Math.floor(time/3600000);
let mins=Math.floor((time%3600000)/60000);
let secs=Math.floor((time%60000)/1000);
let millis=time%1000;

document.getElementById("display").innerHTML=
String(hrs).padStart(2,'0')+":"+
String(mins).padStart(2,'0')+":"+
String(secs).padStart(2,'0')+":"+
String(millis).padStart(3,'0');
}

function startTimer(){

if(!running){

startTime=Date.now()-elapsedTime;

timerInterval=setInterval(()=>{

elapsedTime=Date.now()-startTime;

updateDisplay();

},10);

running=true;
}
}

function pauseTimer(){

clearInterval(timerInterval);
running=false;

}

function resetTimer(){

clearInterval(timerInterval);

running=false;
elapsedTime=0;
lapCount=1;

updateDisplay();

document.getElementById("laps").innerHTML="";

}

function lapTime(){

if(!running) return;

let lap=document.createElement("div");

lap.classList.add("lap-item");

lap.innerHTML=
`<span>Lap ${lapCount}</span>
<span>${document.getElementById("display").innerText}</span>`;

document.getElementById("laps")
.prepend(lap);

lapCount++;
}

updateDisplay();

</script>

</body>
</html>
